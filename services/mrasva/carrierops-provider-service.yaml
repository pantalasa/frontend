apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: carrierops-provider-service
  title: carrierops-provider-service
  description: |
      Internal API service for managing providers, carriers, and bindings in Twilio's messaging and voice infrastructure. Hosts authoritative configuration data for carrier connections, routing endpoints, and protocol-level parameters.

      Core Functionality
      • Provider and carrier CRUD operations and metadata management
      • SMPP and Kannel binding configurations for messaging protocols
      • Voice and SMS endpoint routing management
      • Delivery receipt (DLR) error code mappings and NACK retry configurations
      • SMSC (Short Message Service Center) configurations
      • Session parameters and TLV (Tag-Length-Value) protocol configurations
      • Provider-to-Beepsend system ID mappings
      • Voice capacity group management
      • Shortcode migration and retry logic for provider transitions

      Request Processing
      • Multi-versioned API architecture (V1 with enhanced business logic, V2 with direct DB mapping)
      • Certificate-based authorization with upstream role-based access control
      • Throttling directives applied per-role and globally
      • Cache-first data access pattern with periodic refresh (4-120 second intervals)
      • Region-aware operations (read-write in US1, read-only in AU1/IE1)
      • Integration with downstream systems: Cartographer (service discovery), Salesforce (escalations), gateway clients

      Architecture
      • Scala microservice using Pekko HTTP and ZIO effect system
      • Aurora MySQL primary datastore with Slick ORM, Presto for analytics queries
      • In-memory caching layer with scheduled refresh for high-performance reads
      • Multi-region deployment with regional read replicas
      • Deployed on both ABBA (legacy) and OTK (Kubernetes) platforms
      • Observability via Kamon metrics (Datadog) and Rollbar error tracking
      • Swagger/OpenAPI specification with code generation via Guardrail
