apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: route-ranking-api
  description: |
    Route Ranking Service API for ranking message routing providers based on optimization goals.

    This API provides a single endpoint for real-time provider ranking used by the routing service
    to determine optimal message delivery paths.

    **Ranking Endpoint:**
    - POST /rank: Rank providers based on specified strategy

    **Query Parameters:**
    - metadata (boolean, default: false): Include detailed ranking metadata in response

    **Request Fields:**
    - accountSid: Account SID sending the message (pattern: AC[0-9a-f]{32})
    - feedback: Whether the message provides feedback
    - mcc: Mobile Country Code (100-999)
    - mnc: Mobile Network Code (0-999)
    - routeType: Route type (4, 9, or 49 for combined)
    - providers: List of providers to rank (unique SIDs required)
    - productId: Product ID mapped to optimization goal (e.g., "v007")
    - goal: Optimization goal for ranking
    - profile: Routing profile matching productId configuration
    - costTarget: Optional cost target for COST_TARGET goals

    **Optimization Goals:**
    - QUALITY_OPTIMISATION: Maximize delivery quality
    - RATE_OPTIMISATION: Maximize delivery rate
    - COST_TARGET: Meet specific cost target
    - COST_PER_CONVERSION: Optimize cost per successful conversion
    - NON_FEEDBACK_COST_TARGET: Cost target for non-feedback messages

    **Provider Object:**
    - sid: Provider SID (pattern: OT[0-9a-f]{32})
    - backup: Whether provider is a backup
    - test: Optional live test state (NEW, PHASE_1, PHASE_2)

    **Response:**
    Returns ranked list of providers ordered by preference, optionally including:
    - converted: Number of converted messages
    - total: Total number of messages
    - weight: Weight assigned to provider (permilles)
    - ucb: Upper confidence bound score

    **Key Features:**
    - Multi-armed bandit algorithm for optimal provider selection
    - Support for live testing phases (NEW -> PHASE_1 -> PHASE_2)
    - Configurable optimization strategies per product
    - Real-time ranking based on 10-day sliding window metrics
    - Backup provider support for failover scenarios
  tags:
    - routing
    - ranking
    - sms
    - mms
    - machine-learning
    - optimization
spec:
