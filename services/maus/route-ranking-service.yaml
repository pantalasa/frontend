apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: route-ranking-service
  title: route-ranking-service
  description: |
    Service for ranking message routing providers based on conversion rates and optimization goals.

    Part of the automated route ranking system that uses multi-armed bandit algorithms to optimize
    message delivery by dynamically ranking providers based on historical performance metrics.

    Architecture:
    - Spring Boot REST API service
    - Reads metrics from S3 (produced by route-conversion-rate Spark job)
    - Supports multiple optimization strategies (quality, cost, conversion rate)
    - Handles live testing phases for new providers
