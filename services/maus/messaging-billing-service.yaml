apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: messaging-billing-api
  description: |
    Billing Service API for managing and looking up Billable Items for SMS messages based on metadata.

    This API provides comprehensive endpoints for:

    **Billable Item Lookups:**
    - GET /v3/BillableItems: Query billable items based on message metadata (routing package, direction, number types, carrier info)
    - Supports sophisticated ranking algorithm for multiple matching mappings
    - Handles primary and secondary billable items (e.g., carrier fees)

    **Billable Item Mapping Management:**
    - GET /v3/BillableItemMapping: List all billable item mappings
    - POST /v3/BillableItemMapping: Create new billable item mapping
    - PUT /v3/BillableItemMapping: Update existing billable item mapping
    - DELETE /v3/BillableItemMapping/{autoId}: Delete billable item mapping
    - PUT /v3/BillableItemMapping/{autoId}/enable: Enable a mapping
    - PUT /v3/BillableItemMapping/{autoId}/disable: Disable a mapping

    **Audit & Changelog:**
    - GET /v3/BillableItemChangelog: Retrieve all changelog entries
    - GET /v3/BillableItemChangelog/mappingId/{mappingId}: Get changelog by mapping ID
    - GET /v3/BillableItemChangelog/billableItemSid/{billableItemSid}: Get changelog by billable item SID

    **Key Features:**
    - Metadata-based billable item selection using routing package, direction, number types, and carrier info
    - Ranking algorithm to select best matching mapping when multiple mappings match
    - Support for partial matches with field priority ranking
    - Primary vs Secondary billable item types (e.g., base charge vs carrier fees)
    - Complete audit trail of mapping changes

    **Lookup Logic:**
    - Missing fields in mappings = inconsequential for matching
    - Missing fields in lookups = only match mappings where field is also unspecified
    - Results ranked by number and composition of matches
    - Metadata fields are prioritized for exact ranking determination
  tags:
    - billing
    - sms
    - billable-items
    - sox
    - v3
