apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: messaging-billing-service
  title: messaging-billing-service
  description: |
    Single-purpose service enabling Billable Item (BI) lookups for SMS messages based on metadata. Encapsulates Billable Item selection logic for the messaging stack.

    Core Functionality:
    - Provides Billable Item lookups based on SMS message metadata
    - Manages mappings between message characteristics and billable items
    - Supports primary and secondary billable items (e.g., carrier fees)
    - Implements sophisticated ranking algorithm for multiple matching mappings

    Lookup Criteria:
    - Routing Package (e.g., marketing, 2FA)
    - Message direction (inbound/outbound)
    - Sender/recipient number type (shortcode, longcode)
    - Carrier information (MCC/MNC)

    Architecture:
    - REST API service with OpenAPI specification
    - DynamoDB for billable item mapping storage
    - Administrative endpoints for managing mappings and changelog
