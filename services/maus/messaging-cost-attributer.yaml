apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: messaging-cost-attributer
  title: messaging-cost-attributer
  description: |
    Kafka-based data pipeline service that provides billing, pricing, and cost attribution for all messaging-related usage.

    Processing flow:
    1. Subscribes to MDR (Message Detail Record) updates from Kafka
    2. Detects when messages should be billed
    3. Determines message cost and applicable billable items
    4. Applies configured fixed pricing if applicable
    5. Publishes billing events to Commerce Platform
    6. Writes cost, pricing, and billing data back to MDR

    Note: This is a background processing service that does not expose REST APIs.
