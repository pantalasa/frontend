kind: API
spec:
  type: openapi
  owner: "group:sup-org-734"
  system: messaging-routing-service
  lifecycle: production
  definition:
    $text: "https://code.hq.twilio.com/messaging/routing-service/blob/master/server/api/swaggerIncludingAdminApi.json"
metadata:
  name: messaging-routing-api-v3
  tags:
    - sms
    - mms
    - routing
    - v1
    - v2
    - v3
    - v4
  description: "Routing Service API for managing Route mappings and looking up Routes based on Message Metadata.

This OpenAPI specification includes multiple API versions (v1-v4):

**Version 1 (v1):**
- Admin RouteGroups API: Create, read, update, delete route groups
- Admin Audit Logs API: Query audit logs for route group changes
- Admin Search API: Search and list route groups

**Version 2 (v2):**
- Route Lookup API: Lookup routes by route SID, MCC/MNC, and route type

**Version 3 (v3):**
- Admin Routes API: Manage routes, destinations, and tags
- Admin Automated Routing Destination Configuration API: Configure automated routing destinations by account and MCC
- Routes Lookup API: Public endpoints for route existence checks and lookups

**Version 4 (v4):**
- Admin RouteGroups API: Enhanced route group management with mappings, destinations, and patch operations
- Admin Automated Routing Destination Configuration API: Automated routing destination configuration
- Admin Standard Routes API: Batch toggle operations for standard routes
"
