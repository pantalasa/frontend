  description: "Messaging Routing Service Protected API for internal audit log operations.

This OpenAPI specification contains a single protected endpoint:

**Version 4 (v4) - Protected Endpoints:**
- Audit Log API: Upsert audit log entries for route group changes and administrative operations

This API is for internal system use and requires special authentication/authorization.
"
