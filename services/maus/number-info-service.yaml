---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: number-info-api
  description: |
    Number Info Service API provides comprehensive APIs to manage number info providers and retrieve number information.

    This OpenAPI specification includes multiple API versions and functional areas:

    **Version 1 (v1):**
    - Number Info API: DID and country code lookups
    - Providers API: Provider management
    - Cache API: Cache rules and bulk operations
    - Supplementary Data API: Supplementary data CRUD operations
    - Network Cache Policy API: Network information management
    - HLR Lookup Configuration API: HLR lookup settings
    - Shadow Testing Configuration API: Shadow testing management
    - Connectivity API: Connectivity information
    - Health Check: Service ping endpoint

    **Version 2 (v2):**
    - Number Info API: DID lookups (enhanced)
    - Providers API: Provider management and credentials with enable/disable controls
    - Routing API: Routing policies, routes management, and lookup operations
    - Cache API: Cache rule management (SID-based)

    **Legacy Endpoints (no version prefix):**
    - Number Info API: Direct DID and country code lookups
    - Configuration Changelog API: Configuration change tracking
  tags:
    - number-info
    - dip
    - lookups
    - routing
spec:
  type: openapi
  lifecycle: production
  owner: group:sup-org-2688
  system: dip
  definition:
    $text: https://code.hq.twilio.com/dip/number-info-service/blob/master/server/api/swagger.json

