apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: pricing-configuration-store
  title: pricing-configuration-store
  description: |
    Service for managing account-based pricing configurations for wholesale/fixed pricing accounts in the messaging billing system.

    Provides comprehensive API for managing pricing revisions, reference prices, margins, and automated profitability validation with two-person approval workflow and email notifications.

    Architecture:
    - REST API service with OpenAPI specification
    - DynamoDB for pricing configuration storage
    - Scheduled jobs for profitability validation
    - Email integration for customer notifications
