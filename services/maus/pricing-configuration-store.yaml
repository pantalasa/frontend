apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: pricing-configuration-store-lookup-api
  description: |
    Pricing Configuration Store Lookup API for upstream services to retrieve effective pricing configurations.

    This API provides a single high-performance endpoint optimized for runtime lookups:

    **Lookup Endpoint:**
    - GET /v1/accounts/{accountSid}/effective-pricing-configuration

    **Query Parameters:**
    - mcc: Mobile Country Code (required)
    - mnc: Mobile Network Code (required)
    - originNumberType: LONGCODE or SHORTCODE (required)

    **Response:**
    - 200: Returns effective pricing configuration (price, pricingType)
    - 204: No configuration exists or account lacks fixed pricing flag

    **Key Features:**
    - Cached results updated every 2 minutes for optimal performance
    - Validates account has fixed pricing flag before returning configuration
    - Returns the currently effective pricing based on effectiveFrom dates
    - Supports both longcode and shortcode number types

    **Use Cases:**
    - Real-time pricing lookups during message processing
    - Billing calculations for wholesale/fixed pricing accounts
    - Cost attribution for outbound messaging
  tags:
    - pricing
    - billing
    - lookup
    - wholesale
    - v1
spec:
  type: openapi
  lifecycle: production
  owner: group:default/sup-org-2688
