apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: pricing-configuration-store-admin-api
  description: |
    Pricing Configuration Store Admin API for managing pricing configurations, reference prices, and profitability validation.

    This comprehensive API provides 21 endpoints across multiple functional areas:

    **Account Management (1 endpoint):**
    - GET /v1/admin/accounts: List all accounts with fixed pricing flag enabled

    **Account Configuration (2 endpoints):**
    - GET /v1/admin/accounts/{accountSid}/config: Get account notification configuration
    - PUT /v1/admin/accounts/{accountSid}/config: Save account configuration (emails, notification period, account manager)

    **Pricing Revisions Management (6 endpoints):**
    - GET /v1/admin/accounts/{accountSid}/revisions: Get all pricing revisions for account (grouped by MCC/MNC/number type)
    - GET /v1/admin/accounts/revisions: Get all revisions across all accounts (with optional startDate filter)
    - POST /v1/admin/accounts/{accountSid}/revisions/save: Save pricing revisions (deprecated)
    - POST /v1/admin/accounts/{accountSid}/revisions/save-with-notification: Enhanced save with notification status
    - POST /v1/admin/accounts/{accountSid}/revisions/delete: Delete future revisions by effective date
    - POST /v1/admin/accounts/{accountSid}/revisions/approve: Approve revisions (two-person workflow)

    **Margin Management (2 endpoints):**
    - GET /v1/admin/accounts/{accountSid}/margins: Get all margin configurations for account
    - POST /v1/admin/accounts/{accountSid}/margins/save: Save margin configurations (effective immediately)

    **Notification Management (2 endpoints):**
    - POST /v1/admin/accounts/{accountSid}/notify-upcoming-revisions: Send price change notification email
    - POST /v1/admin/accounts/{accountSid}/schedule-notification: Schedule notification for future price changes

    **Reference Price Management (5 endpoints):**
    - GET /v1/admin/reference-price: List all wholesale reference prices
    - GET /v1/admin/reference-price/{mcc}/{mnc}/{currency}: Get reference price for specific network
    - POST /v1/admin/reference-price: Create new reference price (requires Supervisor role)
    - PUT /v1/admin/reference-price/{mcc}/{mnc}/{currency}: Update reference price (requires Supervisor role)
    - DELETE /v1/admin/reference-price/{mcc}/{mnc}/{currency}: Delete reference price (requires Supervisor role)

    **Reference Price Network Exclusions (2 endpoints):**
    - POST /v1/admin/reference-price-network-exclusion: Add network exclusions for reference price
    - DELETE /v1/admin/reference-price-network-exclusion: Remove network exclusions

    **Profitability & Cost Validation (3 endpoints):**
    - GET /v1/admin/accounts/reference-price-delta: Get accounts with prices differing from reference
    - POST /v1/admin/accounts/configurations/profitability-check: Trigger wholesale profitability validation via Athena
    - GET /v1/admin/accounts/configurations/costs: Fetch account configuration costs from S3

    **Currency & Exchange Rates (1 endpoint):**
    - GET /v1/admin/currency-exchange-rates: Get currency exchange rates for cost calculations

    **Changelog (2 endpoints):**
    - GET /v1/admin/changelog: Fetch changelog (trailing 1 month by default)
    - GET /v1/admin/changelog/{key}: Fetch changelog by item key

    **Key Features:**
    - Two-person approval workflow (creator cannot approve their own changes)
    - Role-based access control (Supervisor role required for reference price management)
    - Time-based pricing changes with effective dates
    - Automated email notifications for price changes
    - Profitability validation with automatic price updates
    - Complete audit trail with user signatures and timestamps
    - Multi-currency support with exchange rate integration
  tags:
    - pricing
    - billing
    - admin
    - sox
    - wholesale
    - fixed-pricing
    - reference-price
    - v1
