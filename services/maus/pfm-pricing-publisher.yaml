apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: pfm-pricing-publisher
  title: pfm-pricing-publisher
  description: |
    Kafka-based pricing publisher service that processes SVT (Stored Value Transaction) records and publishes pricing events to MDP (Messaging Data Platform).

    Processing flow:
    1. Consumes SVT records from Kafka topic
    2. Extracts required pricing fields from SVT records
    3. Creates MDR (Message Detail Record) updates with pricing information
    4. Sends MDR updates to MSS (Message State Service)
    5. Publishes pricing data to MDP for analytics and reporting

    This service is a rewrite of the legacy pfm-pricing-service from the postflight-messaging-clerk codebase.

    Note: This is a background Kafka consumer service that only exposes basic health check endpoints (/healthcheck, /threaddump), not a full REST API.
