name: CD
on:
    push:
        branches:
            - main
env:
    LUNAR_HUB_HOST: lunar.demo.earthly.dev
    LUNAR_HUB_GRPC_PORT: 443
    LUNAR_HUB_HTTP_PORT: 443
    LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
jobs:
    deploy:
        runs-on: localdev-dchw-test1428-main
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install Lunar CLI
              run: |
                curl -sL https://github.com/earthly/lunar-dist/releases/download/v1.0.11/lunar-linux-amd64 -o /usr/local/bin/lunar
                chmod +x /usr/local/bin/lunar
            - name: Lunar release gate
              run: "echo \"\U0001F512 Checking release policies for this commit...\"\nlunar policy ok-release github.com/pantalasa/frontend\necho \"✅ All release policies passed — proceeding with deploy.\"\n"
            - name: Deploy to production
              run: "echo \"\U0001F680 Deploying frontend ${{ github.sha }} to production...\"\nsleep 2\necho \"Deploy complete.\"\n"
