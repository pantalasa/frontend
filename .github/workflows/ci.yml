name: GH-Actions
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
jobs:
  frontend_service_build:
    runs-on: lunar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Node service tests
        run: |
          npm install --save-dev jest
          npm test
        continue-on-error: true
