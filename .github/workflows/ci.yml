name: GH-Actions
on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"
env:
    CARGO_TERM_COLOR: always
jobs:
    frontend_service_build:
        runs-on: localdev-brandon-main
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                clean: true
            - name: Node service tests
              run: |-
                npm test
