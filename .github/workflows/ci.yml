name: GH-Actions
on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - "**"
env:
    CARGO_TERM_COLOR: always
jobs:
    frontend_service_build:
        runs-on: localdev-root-
        steps:
            - name: Run Lunar CI Agent
              uses: earthly/lunar-ci-action@main
              env:
                LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
                LUNAR_HUB_HOST: lunar.demo.earthly.dev
                LUNAR_LOG_LEVEL: debug
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                clean: true
            - name: Node service tests
              run: |
                npm install --save-dev jest
                npm test
