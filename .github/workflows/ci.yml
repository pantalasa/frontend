name: GH-Actions

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: nacho-test

    steps:
      - name: Run Lunar CI Agent
        uses: earthly/lunar-ci-action@main
        env:
          LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
          LUNAR_HUB_HOST: lunar.demo.earthly.dev

      - name: Node service tests
        shell: bash
        run: |
          env
          ls

      - name: Teardown Lunar CI Agent (always last)
        if: ${{ always() }}
        shell: bash
        run: |
          sleep 1000